      - generic [ref=e261]:
        - heading "Method notes" [level=2] [ref=e262]
        - paragraph [ref=e263]:
          - text: FX mode uses approximate market exchange rates and PPP mode uses simplified purchasing-power or regional-price factors. Taxes remain explanatory approximations for a single filer or resident and still do not cover every credit, treaty, payroll cap edge case, or passive-loss rule.
          - strong [ref=e264]: Version 8 also fixes the property cash-flow treatment
          - text: so rental gains and losses affect both taxable income and net take-home instead of only altering the tax bill.